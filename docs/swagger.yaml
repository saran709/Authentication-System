openapi: 3.0.0
info:
  title: Auth API
  version: 1.0.0
paths:
  /api/auth/register:
    post:
      summary: Register
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201': { description: Registered }
